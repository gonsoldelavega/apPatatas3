<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E4434"/>
      <stop offset=".55" stop-color="#163327"/>
      <stop offset="1" stop-color="#0D1F18"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="6%" r="70%">
      <stop offset="0" stop-color="#D8B26B" stop-opacity=".34"/>
      <stop offset="1" stop-color="#D8B26B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#F1D18D"/>
      <stop offset=".5" stop-color="#D8B26B"/>
      <stop offset="1" stop-color="#A87C36"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".55"/>
      <stop offset=".25" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#glow)"/>
  <rect x="5" y="5" width="502" height="502" rx="113" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="3"/>
  <rect x="14" y="14" width="484" height="484" rx="106" fill="none" stroke="rgba(216,178,107,.22)" stroke-width="2"/>

  <!-- Monograma F geométrico en oro -->
  <g>
    <!-- asta -->
    <rect x="172" y="118" width="62" height="276" rx="26" fill="url(#gold)"/>
    <!-- brazo superior -->
    <rect x="172" y="118" width="190" height="58" rx="26" fill="url(#gold)"/>
    <!-- brazo medio -->
    <rect x="172" y="232" width="148" height="54" rx="24" fill="url(#gold)"/>
    <!-- brillo superior -->
    <rect x="172" y="118" width="190" height="58" rx="26" fill="url(#goldEdge)"/>
    <rect x="172" y="118" width="62" height="276" rx="26" fill="url(#goldEdge)" opacity=".5"/>
  </g>

  <!-- Punto dorado: la "marca" de la app (eco del botón Crear) -->
  <circle cx="332" cy="368" r="27" fill="url(#gold)"/>
  <circle cx="332" cy="368" r="27" fill="url(#goldEdge)" opacity=".7"/>
  <circle cx="332" cy="368" r="36" fill="none" stroke="rgba(216,178,107,.30)" stroke-width="3"/>
</svg>
