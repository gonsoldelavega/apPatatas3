name: CI

# Verifica sintaxis y tests en cada push/PR. Sin dependencias externas:
# usa node --check (via scripts/check-syntax.mjs) y el runner nativo node --test.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Comprobar sintaxis (src/ api/ scripts/ sw.js)
        run: npm run check

      - name: Tests
        run: npm test
