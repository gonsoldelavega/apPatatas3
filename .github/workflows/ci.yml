name: CI

# Verifica sintaxis y tests en cada push. Sin dependencias externas:
# usa node --check (via scripts/check-syntax.mjs) y el runner nativo node --test.

on:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Comprobar sintaxis (src/ api/ scripts/ sw.js)
        run: npm run check

      - name: Tests
        run: npm test
