name: FactuPapa Next Integration

on:
  push:
    branches:
      - design/factupapa-full-prototype
    paths:
      - 'factupapa-next/**'
      - '.github/workflows/factupapa-next-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: factupapa-next-integration
  cancel-in-progress: false

jobs:
  integration:
    if: github.ref == 'refs/heads/design/factupapa-full-prototype'
    runs-on: [self-hosted, linux, x64, factupapa-next]
    timeout-minutes: 60
    env:
      DOCKER_HOST: unix:///run/user/1001/docker.sock
      COMPOSE_PROJECT_NAME: factupapa_next_ci_${{ github.run_id }}_${{ github.run_attempt }}
      COMPOSE_FILE: docker-compose.yml:docker-compose.integration.yml
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify rootless Docker context
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/design/factupapa-full-prototype"
          test "$(id -u)" = "1001"
          test "${DOCKER_HOST}" = "unix:///run/user/1001/docker.sock"
          test -S /run/user/1001/docker.sock
          test "$(stat -c '%u' /run/user/1001/docker.sock)" = "1001"
          docker info --format '{{json .SecurityOptions}}' | grep -q 'name=rootless'
          docker version
          docker compose version

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            factupapa-next/apps/api/package-lock.json
            factupapa-next/apps/web/package-lock.json

      - name: Validate API
        working-directory: factupapa-next/apps/api
        env:
          APP_ENV: integration
          DATABASE_URL: postgresql://factupapa_api:fictitious-api-password-2026@postgres:5432/factupapa_next
          DATABASE_ADMIN_URL: postgresql://factupapa:fictitious-admin-password-2026@postgres:5432/factupapa_next
          JWT_SECRET: fictitious-integration-jwt-secret-with-more-than-sixty-four-characters-2026
          REDIS_URL: redis://:fictitious-redis-password-2026@redis:6379
          S3_ENDPOINT: http://minio:9000
          S3_ACCESS_KEY: factupapa_storage
          S3_SECRET_KEY: fictitious-object-password-2026
          AUTH_COOKIE_SECURE: 'false'
          CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173
        run: |
          set -euo pipefail
          npm ci
          npm run config:check
          npm run typecheck
          npm test
          npm run build

      - name: Validate web
        working-directory: factupapa-next/apps/web
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm test
          npm run build
          npm exec -- playwright install chromium

      - name: Scan repository for secrets and local paths
        run: |
          set -euo pipefail
          ! git grep -nE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}' -- factupapa-next .github
          ! git grep -nE '/(Users|home|root|workspace)/' -- factupapa-next .github

      - name: Create temporary integration environment
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          umask 077
          cp .env.example .env

          postgres_password="$(openssl rand -hex 32)"
          api_database_password="$(openssl rand -hex 32)"
          redis_password="$(openssl rand -hex 32)"
          minio_password="$(openssl rand -hex 32)"
          jwt_secret="$(openssl rand -hex 64)"
          metrics_token="$(openssl rand -hex 48)"

          sed -i \
            -e "s|^APP_ENV=.*|APP_ENV=integration|" \
            -e "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${postgres_password}|" \
            -e "s|^API_DATABASE_PASSWORD=.*|API_DATABASE_PASSWORD=${api_database_password}|" \
            -e "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${redis_password}|" \
            -e "s|^REDIS_URL=.*|REDIS_URL=redis://:${redis_password}@redis:6379|" \
            -e "s|^MINIO_ROOT_PASSWORD=.*|MINIO_ROOT_PASSWORD=${minio_password}|" \
            -e "s|^DATABASE_ADMIN_URL=.*|DATABASE_ADMIN_URL=postgresql://factupapa:${postgres_password}@postgres:5432/factupapa_next|" \
            -e "s|^DATABASE_URL=.*|DATABASE_URL=postgresql://factupapa_api:${api_database_password}@postgres:5432/factupapa_next|" \
            -e "s|^S3_SECRET_KEY=.*|S3_SECRET_KEY=${minio_password}|" \
            -e "s|^JWT_SECRET=.*|JWT_SECRET=${jwt_secret}|" \
            -e "s|^INTERNAL_METRICS_TOKEN=.*|INTERNAL_METRICS_TOKEN=${metrics_token}|" \
            -e "s|^INTERNAL_METRICS_ALLOW_REMOTE=.*|INTERNAL_METRICS_ALLOW_REMOTE=true|" \
            .env

          ! grep -q 'CAMBIAR_' .env
          test "$(stat -c '%a' .env)" = "600"

          cat > docker-compose.integration.yml <<EOF
          networks:
            factupapa:
              name: ${COMPOSE_PROJECT_NAME}_network
          EOF

          unset postgres_password api_database_password redis_password minio_password jwt_secret metrics_token

      - name: Validate Docker Compose configuration
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          docker compose config --quiet

      - name: Start integration services
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          docker compose up --build -d

      - name: Wait for required services
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail

          wait_for_healthy() {
            local service="$1"
            local container_id=""
            local status=""

            for _ in $(seq 1 60); do
              container_id="$(docker compose ps -a -q "${service}")"
              if [ -n "${container_id}" ]; then
                status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container_id}")"
                if [ "${status}" = "healthy" ]; then
                  echo "${service}: healthy"
                  return 0
                fi
                if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ] || [ "${status}" = "dead" ]; then
                  echo "${service}: ${status}" >&2
                  return 1
                fi
              fi
              sleep 2
            done

            echo "Timeout esperando a ${service} (último estado: ${status:-sin contenedor})" >&2
            return 1
          }

          wait_for_healthy postgres
          wait_for_healthy redis
          wait_for_healthy minio
          wait_for_healthy api
          wait_for_healthy web

      - name: Run authentication integration tests
        working-directory: factupapa-next/apps/api
        run: |
          set -euo pipefail
          set -a
          source ../../infrastructure/.env
          set +a
          export DATABASE_ADMIN_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}"
          export DATABASE_URL="postgresql://${API_DATABASE_USER}:${API_DATABASE_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}"
          integration_log="${RUNNER_TEMP}/factupapa-next-integration.tap"
          set +e
          npm run test:integration 2>&1 | tee "${integration_log}"
          test_status="${PIPESTATUS[0]}"
          set -e
          if [ "${test_status}" -ne 0 ]; then
            failure_names="$(
              grep -E '^[[:space:]]*(not ok [0-9]+ - |error:|code:)' "${integration_log}" \
                | sed -E 's#postgresql://[^[:space:]@]+@#postgresql://[redacted]@#g' \
                | head -n 15 \
                || true
            )"
            if [ -z "${failure_names}" ]; then
              failure_names="Pruebas de integración fallidas; consulte el log autenticado del job"
            fi
            while IFS= read -r failure_name; do
              echo "::error title=Authentication integration test failed::${failure_name}"
            done <<< "${failure_names}"
            exit "${test_status}"
          fi
          rm -f "${integration_log}"
          unset DATABASE_ADMIN_URL DATABASE_URL POSTGRES_PASSWORD API_DATABASE_PASSWORD REDIS_PASSWORD MINIO_ROOT_PASSWORD S3_SECRET_KEY JWT_SECRET

      - name: Verify API endpoints
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          set -a
          source .env
          set +a

          health_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4100/health)"
          ready_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4100/ready)"

          test "${health_status}" = "200"
          test "${ready_status}" = "200"
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4100/internal/metrics)" = "404"
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' -H "X-Operations-Token: ${INTERNAL_METRICS_TOKEN}" http://127.0.0.1:4100/internal/metrics)" = "200"
          echo "API health: HTTP ${health_status}"
          echo "API ready: HTTP ${ready_status}"
          unset INTERNAL_METRICS_TOKEN

      - name: Smoke test web and authenticated load
        working-directory: factupapa-next/apps/web
        run: |
          set -euo pipefail
          smoke_email="smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.test"
          smoke_password="$(openssl rand -base64 36 | tr -d '\n')"

          (
            cd ../../infrastructure
            APP_ENV=integration \
            DEMO_USER_EMAIL="${smoke_email}" \
            DEMO_USER_PASSWORD="${smoke_password}" \
            docker compose --profile tools run --build --rm \
              -e APP_ENV -e DEMO_USER_EMAIL -e DEMO_USER_PASSWORD seed
          )

          WEB_URL="http://127.0.0.1:4173" \
          API_URL="http://127.0.0.1:4100" \
          SMOKE_EMAIL="${smoke_email}" \
          SMOKE_PASSWORD="${smoke_password}" \
          SMOKE_PDF_PATH="${PWD}/test-artifacts/factura-ficticia.pdf" \
          npm run smoke

          DEMO_USER_EMAIL="${smoke_email}" DEMO_USER_PASSWORD="${smoke_password}" \
          WEB_URL="http://127.0.0.1:4173" npx playwright test

          unset smoke_email smoke_password

      - name: Verify retention, database backup, objects and isolated restore
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          set -a
          source .env
          set +a
          artifacts="${RUNNER_TEMP}/factupapa-operational-artifacts"
          export OPERATIONS_METRICS_URL="http://127.0.0.1:${APP_PORT:-4100}"
          mkdir -p "${artifacts}"
          chmod 700 "${artifacts}"

          company_id="$(docker compose exec -T postgres sh -c 'PGPASSWORD="$POSTGRES_PASSWORD" psql --no-psqlrc -At -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "select id from companies order by created_at limit 1"')"
          user_id="$(docker compose exec -T postgres sh -c 'PGPASSWORD="$POSTGRES_PASSWORD" psql --no-psqlrc -At -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "select id from users order by created_at limit 1"')"
          (
            cd ../apps/api
            export DATABASE_URL="postgresql://${API_DATABASE_USER}:${API_DATABASE_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}"
            CLEANUP_COMPANY_ID="${company_id}" CLEANUP_USER_ID="${user_id}" npm run cleanup:imports -- --dry-run
            CLEANUP_COMPANY_ID="${company_id}" CLEANUP_USER_ID="${user_id}" npm run cleanup:imports
          )

          docker compose run --rm --entrypoint sh create-buckets -c 'mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null; printf "%s" "fictitious-object" | mc pipe local/factupapa-documents/ci/fictitious.txt >/dev/null'
          (
            cd ../apps/api
            BACKUP_ENVIRONMENT=integration BACKUP_DIRECTORY="${artifacts}" npm run --silent backup:database | tee "${artifacts}/backup.log"
            S3_ENDPOINT="http://127.0.0.1:${MINIO_API_PORT}" OBJECT_BACKUP_DIRECTORY="${artifacts}/objects" npm run --silent backup:objects | tee "${artifacts}/objects.log"
          )
          dump="$(node -e 'const fs=require("fs"); const lines=fs.readFileSync(process.argv[1],"utf8").trim().split(/\n/); const x=JSON.parse(lines.at(-1)); process.stdout.write(x.dump)' "${artifacts}/backup.log")"
          (
            cd ../apps/api
            RESTORE_DUMP="${dump}" RESTORE_ENVIRONMENT=integration RESTORE_TARGET=ci RESTORE_REPORT_DIRECTORY="${artifacts}" npm run --silent restore:verify -- --confirm-isolated-restore
          )

          cp "${dump}" "${artifacts}/tampered.dump"
          cp "${dump}.manifest.json" "${artifacts}/tampered.dump.manifest.json"
          cp "${dump}.sha256" "${artifacts}/tampered.dump.sha256"
          printf 'x' >> "${artifacts}/tampered.dump"
          if (cd ../apps/api && RESTORE_DUMP="${artifacts}/tampered.dump" RESTORE_ENVIRONMENT=integration RESTORE_TARGET=tampered npm run --silent restore:verify -- --confirm-isolated-restore); then
            echo "Una copia manipulada fue aceptada" >&2
            exit 1
          fi
          cp "${dump}" "${artifacts}/incomplete.dump"
          if (cd ../apps/api && RESTORE_DUMP="${artifacts}/incomplete.dump" RESTORE_ENVIRONMENT=integration RESTORE_TARGET=incomplete npm run --silent restore:verify -- --confirm-isolated-restore); then
            echo "Una copia incompleta fue aceptada" >&2
            exit 1
          fi
          if (cd ../apps/api && BACKUP_ENVIRONMENT=integration BACKUP_DIRECTORY=/proc/factupapa-backup-impossible npm run --silent backup:database); then
            echo "El fallo controlado de backup no fue detectado" >&2
            exit 1
          fi

          (cd ../apps/api && BACKUP_ENVIRONMENT=integration BACKUP_DIRECTORY="${artifacts}/concurrent" npm run --silent backup:database) & first=$!
          (cd ../apps/api && BACKUP_ENVIRONMENT=integration BACKUP_DIRECTORY="${artifacts}/concurrent" npm run --silent backup:database) & second=$!
          wait "${first}"
          wait "${second}"
          metrics_json="$(curl --silent --show-error --fail -H "X-Operations-Token: ${INTERNAL_METRICS_TOKEN}" "${OPERATIONS_METRICS_URL}/internal/metrics")"
          node -e 'const value=JSON.parse(process.argv[1]); if(value.backupFailures<1 || value.restoreFailures<2) process.exit(1)' "${metrics_json}"

          cp "${dump}.manifest.json" "${artifacts}/database-backup.manifest.json"
          find "${artifacts}/objects" -name manifest.json -exec cp {} "${artifacts}/object-backup.manifest.json" \;
          rm -f "${artifacts}"/*.dump "${artifacts}"/*.dump.manifest.json "${artifacts}"/*.dump.sha256
          rm -rf "${artifacts}/concurrent" "${artifacts}/objects"
          unset POSTGRES_PASSWORD API_DATABASE_PASSWORD REDIS_PASSWORD MINIO_ROOT_PASSWORD S3_SECRET_KEY JWT_SECRET INTERNAL_METRICS_TOKEN OPERATIONS_METRICS_URL

      - name: Controlled dependency failures and recovery
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          for dependency in redis minio postgres; do
            docker compose stop "${dependency}"
            for _ in $(seq 1 15); do
              status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4100/ready || true)"
              [ "${status}" = "503" ] && break
              sleep 1
            done
            test "${status}" = "503"
            docker compose start "${dependency}"
            for _ in $(seq 1 30); do
              status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4100/ready || true)"
              [ "${status}" = "200" ] && break
              sleep 1
            done
            test "${status}" = "200"
          done
          docker compose logs --no-color api > "${RUNNER_TEMP}/factupapa-operational-artifacts/api-sanitized.log"
          ! grep -Eqi 'authorization|factupapa_refresh=|Bearer [A-Za-z0-9]|password|refreshToken|accessToken' "${RUNNER_TEMP}/factupapa-operational-artifacts/api-sanitized.log"

      - name: Full destructive recovery rehearsal with fictitious data
        working-directory: factupapa-next/infrastructure
        run: |
          set -euo pipefail
          set -a
          source .env
          set +a
          export DEMO_USER_EMAIL="recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.test"
          export DEMO_USER_PASSWORD="$(openssl rand -base64 36 | tr -d '\n')"
          ../scripts/disaster-recovery.sh | tee "${RUNNER_TEMP}/factupapa-operational-artifacts/recovery.log"
          unset DEMO_USER_EMAIL DEMO_USER_PASSWORD

      - name: Show service status
        working-directory: factupapa-next/infrastructure
        run: docker compose ps

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: factupapa-next-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            factupapa-next/apps/web/test-artifacts
            factupapa-next/apps/web/test-results
            factupapa-next/apps/web/playwright-report
            ${{ runner.temp }}/factupapa-operational-artifacts/*.manifest.json
            ${{ runner.temp }}/factupapa-operational-artifacts/restore-*.json
            ${{ runner.temp }}/factupapa-operational-artifacts/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Show diagnostics on failure
        if: failure()
        working-directory: factupapa-next/infrastructure
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=200 postgres redis minio create-buckets migrate provision-api-role api web || true

      - name: Clean integration environment
        if: always()
        working-directory: factupapa-next/infrastructure
        run: |
          docker compose down -v --remove-orphans || true
          rm -f .env docker-compose.integration.yml
          rm -rf ../apps/web/test-artifacts ../apps/web/test-results ../apps/web/playwright-report
          rm -rf "${RUNNER_TEMP}/factupapa-operational-artifacts"
