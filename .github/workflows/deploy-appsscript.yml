name: Deploy Apps Script

# Despliega automaticamente el agente (apps-script/gonsol-drive-organizer)
# a tu proyecto de Google Apps Script cada vez que cambia su codigo en main.
#
# Requiere dos secretos del repositorio (Settings -> Secrets and variables -> Actions):
#   - CLASPRC_JSON : contenido completo de tu ~/.clasprc.json (resultado de "clasp login")
#   - SCRIPT_ID    : el Script ID del proyecto (Apps Script -> Project Settings -> IDs)
#
# Ver apps-script/gonsol-drive-organizer/AUTO_DEPLOY.md para los pasos (una sola vez).

on:
  push:
    branches:
      - main
    paths:
      - "apps-script/gonsol-drive-organizer/**"
      - ".github/workflows/deploy-appsscript.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Comprobar secretos
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then echo "Falta el secreto CLASPRC_JSON"; exit 1; fi
          if [ -z "$SCRIPT_ID" ]; then echo "Falta el secreto SCRIPT_ID"; exit 1; fi

      - name: Escribir credenciales de clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Configurar .clasp.json
        working-directory: apps-script/gonsol-drive-organizer
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: printf '{"scriptId":"%s","rootDir":"."}' "$SCRIPT_ID" > .clasp.json

      - name: Push a Apps Script
        working-directory: apps-script/gonsol-drive-organizer
        run: clasp push --force
