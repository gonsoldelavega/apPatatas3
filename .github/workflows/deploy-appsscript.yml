name: Deploy Apps Script

# Despliega automaticamente el agente (apps-script/gonsol-drive-organizer)
# a tu proyecto de Google Apps Script cada vez que cambia su codigo en main.
#
# Requiere dos secretos del repositorio (Settings -> Secrets and variables -> Actions):
#   - CLASPRC_JSON : contenido completo de tu ~/.clasprc.json (resultado de "clasp login")
#   - SCRIPT_ID    : el Script ID del proyecto (Apps Script -> Project Settings -> IDs)
#
# Ver apps-script/gonsol-drive-organizer/AUTO_DEPLOY.md para los pasos (una sola vez).

on:
  push:
    branches:
      - main
    paths:
      - "apps-script/gonsol-drive-organizer/**"
      - ".github/workflows/deploy-appsscript.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Comprobar secretos
        env:
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          if [ -z "$CLASP_REFRESH_TOKEN" ]; then echo "Falta el secreto CLASP_REFRESH_TOKEN"; exit 1; fi
          if [ -z "$CLASP_CLIENT_ID" ]; then echo "Falta el secreto CLASP_CLIENT_ID"; exit 1; fi
          if [ -z "$CLASP_CLIENT_SECRET" ]; then echo "Falta el secreto CLASP_CLIENT_SECRET"; exit 1; fi
          if [ -z "$SCRIPT_ID" ]; then echo "Falta el secreto SCRIPT_ID"; exit 1; fi

      - name: Escribir credenciales de clasp
        working-directory: apps-script/gonsol-drive-organizer
        env:
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
        run: |
          RT="$(printf '%s' "$CLASP_REFRESH_TOKEN" | tr -d '[:space:]')"
          CID="$(printf '%s' "$CLASP_CLIENT_ID" | tr -d '[:space:]')"
          CS="$(printf '%s' "$CLASP_CLIENT_SECRET" | tr -d '[:space:]')"
          CREDS='{token:{access_token:"",refresh_token:$rt,scope:"https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.deployments",token_type:"Bearer",expiry_date:1},oauth2ClientSettings:{clientId:$cid,clientSecret:$cs,redirectUri:"https://developers.google.com/oauthplayground"},isLocalCreds:true}'
          jq -n --arg rt "$RT" --arg cid "$CID" --arg cs "$CS" "$CREDS" > .clasprc.json
          jq -n --arg rt "$RT" --arg cid "$CID" --arg cs "$CS" "$CREDS" > "$HOME/.clasprc.json"

      - name: Configurar .clasp.json
        working-directory: apps-script/gonsol-drive-organizer
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: printf '{"scriptId":"%s","rootDir":"."}' "$SCRIPT_ID" > .clasp.json

      - name: Diagnostico de credenciales
        env:
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
        run: |
          RT="$(printf '%s' "$CLASP_REFRESH_TOKEN" | tr -d '[:space:]')"
          CID="$(printf '%s' "$CLASP_CLIENT_ID" | tr -d '[:space:]')"
          CS="$(printf '%s' "$CLASP_CLIENT_SECRET" | tr -d '[:space:]')"
          echo "client_id termina en: ...${CID: -16}"
          echo "client_id longitud: ${#CID}  client_secret longitud: ${#CS}  refresh_token longitud: ${#RT}"
          RESP="$(curl -s -X POST https://oauth2.googleapis.com/token -d grant_type=refresh_token -d client_id="$CID" -d client_secret="$CS" -d refresh_token="$RT")"
          echo "Respuesta de Google:"
          echo "$RESP" | grep -o '"error[^,}]*' || echo "TOKEN OK (sin error de credenciales)"

      - name: Push a Apps Script
        working-directory: apps-script/gonsol-drive-organizer
        run: clasp push --force
