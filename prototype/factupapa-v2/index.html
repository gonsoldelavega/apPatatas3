<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#14213d" />
  <title>FactuPapa — Prototipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="sectionEyebrow">JULIO 2026</p>
        <h1 id="sectionTitle">FactuPapa</h1>
      </div>
      <div class="top-actions">
        <button class="icon-btn" data-action="search" aria-label="Buscar">⌕</button>
        <button class="icon-btn" data-action="alerts" aria-label="Avisos">◉<span class="dot"></span></button>
        <button class="avatar" data-action="profile">NV</button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <button id="fab" class="fab" aria-label="Nuevo">+</button>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button class="nav-item active" data-view="home"><span>⌂</span><small>Inicio</small></button>
      <button class="nav-item" data-view="sales"><span>▤</span><small>Ventas</small></button>
      <button class="nav-item nav-spacer" tabindex="-1"></button>
      <button class="nav-item" data-view="contacts"><span>♙</span><small>Contactos</small></button>
      <button class="nav-item" data-view="more"><span>•••</span><small>Más</small></button>
    </nav>
  </div>

  <div id="sheetBackdrop" class="sheet-backdrop hidden"></div>
  <section id="sheet" class="sheet hidden" aria-modal="true" role="dialog"></section>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
