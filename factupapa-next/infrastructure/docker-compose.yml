services:
  postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factupapa_next}
      POSTGRES_USER: ${POSTGRES_USER:-factupapa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factupapa} -d ${POSTGRES_DB:-factupapa_next}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [factupapa]
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Define REDIS_PASSWORD in .env}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Define REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [factupapa]
    security_opt: [no-new-privileges:true]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Define MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Define MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [factupapa]
    security_opt: [no-new-privileges:true]

  create-buckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/factupapa-documents;
      mc anonymous set none local/factupapa-documents;
      exit 0;"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Define MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Define MINIO_ROOT_PASSWORD in .env}
    networks: [factupapa]

  migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["npm", "run", "migrate:prod"]
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_ADMIN_URL:?Define DATABASE_ADMIN_URL in .env}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks: [factupapa]

  provision-api-role:
    image: postgres:16-alpine
    command: ["sh", "/opt/factupapa/provision-api-role.sh"]
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-factupapa_next}
      PGUSER: ${POSTGRES_USER:-factupapa}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD in .env}
      API_DATABASE_USER: ${API_DATABASE_USER:-factupapa_api}
      API_DATABASE_PASSWORD: ${API_DATABASE_PASSWORD:?Define API_DATABASE_PASSWORD in .env}
    volumes:
      - ./postgres/provision-api-role.sh:/opt/factupapa/provision-api-role.sh:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [factupapa]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 4100
      APP_VERSION: ${APP_VERSION:-local}
      DATABASE_URL: ${DATABASE_URL:?Define DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET in .env}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-factupapa_refresh}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-5}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-60000}
      IMPORT_MAX_BYTES: ${IMPORT_MAX_BYTES:-1048576}
      IMPORT_MAX_ROWS: ${IMPORT_MAX_ROWS:-1000}
      IMPORT_PREVIEW_ROWS: ${IMPORT_PREVIEW_ROWS:-50}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:4173}
      REDIS_URL: ${REDIS_URL:?Define REDIS_URL in .env}
      S3_ENDPOINT: ${S3_ENDPOINT:?Define S3_ENDPOINT in .env}
      S3_BUCKET: ${S3_BUCKET:-factupapa-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Define S3_ACCESS_KEY in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Define S3_SECRET_KEY in .env}
      INTERNAL_METRICS_TOKEN: ${INTERNAL_METRICS_TOKEN:-}
      INTERNAL_METRICS_ALLOW_REMOTE: ${INTERNAL_METRICS_ALLOW_REMOTE:-false}
      DEPENDENCY_TIMEOUT_MS: ${DEPENDENCY_TIMEOUT_MS:-2000}
      IMPORT_RETENTION_COMPLETED_DAYS: ${IMPORT_RETENTION_COMPLETED_DAYS:-30}
      IMPORT_RETENTION_CANCELLED_DAYS: ${IMPORT_RETENTION_CANCELLED_DAYS:-7}
      IMPORT_RETENTION_FAILED_DAYS: ${IMPORT_RETENTION_FAILED_DAYS:-14}
      IMPORT_CLEANUP_LIMIT: ${IMPORT_CLEANUP_LIMIT:-500}
    ports:
      - "127.0.0.1:${APP_PORT:-4100}:4100"
    depends_on:
      provision-api-role:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks: [factupapa]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${WEB_API_BASE_URL:-http://127.0.0.1:4100}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-4173}:4173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4173/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks: [factupapa]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]

  bootstrap:
    profiles: [tools]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["npm", "run", "bootstrap:prod"]
    restart: "no"
    environment:
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:?Define DATABASE_ADMIN_URL in .env}
    depends_on:
      provision-api-role:
        condition: service_completed_successfully
    networks: [factupapa]

  seed:
    profiles: [tools]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["npm", "run", "seed:prod"]
    restart: "no"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:?Define DATABASE_ADMIN_URL in .env}
    depends_on:
      provision-api-role:
        condition: service_completed_successfully
    networks: [factupapa]

networks:
  factupapa:
    name: factupapa_next

volumes:
  postgres_data:
  redis_data:
  minio_data:
