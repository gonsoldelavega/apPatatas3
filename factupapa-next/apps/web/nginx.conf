server {
  listen 4173;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
