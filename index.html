  <script>
    (function(){
      function apply(pref){
        var mode = (pref === "light" || pref === "dark") ? pref
          : ((window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", mode);
        var meta = document.querySelector('meta[name="theme-color"]');
        if(meta) meta.setAttribute("content", mode === "dark" ? "#060C09" : "#122B21");
      }
      window.__factupapaTheme = {
        get: function(){ try { return localStorage.getItem("factupapa-theme") || "system"; } catch(e){ return "system"; } },
        set: function(pref){ try { localStorage.setItem("factupapa-theme", pref); } catch(e){} apply(pref); },
        apply: apply
      };
      apply(window.__factupapaTheme.get());
      if(window.matchMedia){
        try{
          window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){
            if(window.__factupapaTheme.get() === "system") apply("system");
          });
        }catch(e){}
      }
    })();
  </script>
</head>
