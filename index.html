<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2D5C43">
  <title>Factupapa</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./src/styles/tokens.css">
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/layout.css">

  <link rel="stylesheet" href="./src/styles/print.css">
  <link rel="stylesheet" href="./src/styles/themes.css">
</head>
<body>
  <div class="app">
    <header id="appHeader" style="
      display:flex; align-items:center; justify-content:space-between;
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      position: sticky; top:0; z-index:50;
      background: rgba(42,31,26,.97);
      border-bottom: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 2px 12px rgba(26,15,8,.18);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    ">
      <span style="font-family:'Lora',Georgia,serif;font-size:1.25rem;font-weight:700;letter-spacing:-.03em;color:#FDF8F0;">Factu<span style="color:#C4602A;">papa</span></span>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="syncDot" style="width:7px;height:7px;border-radius:50%;background:#5A7A3A;" title="Sincronizado"></div>
        <button class="icon ghost" id="installBtn" style="min-height:36px;width:36px;min-width:36px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);color:rgba(253,248,240,.7);font-size:.75rem;font-weight:700;">App</button>
      </div>
    </header>
    <nav class="tabs panel" id="tabs"></nav>
    <main id="views"></main>
  </div>
  <div id="modal" class="modal" aria-hidden="true">
    <div class="sheet">
      <div class="panel-h">
        <div>
          <h2 id="modalTitle">Formulario</h2>
          <div class="sub" id="modalSub"></div>
        </div>
        <button class="icon ghost" id="closeModal">x</button>
      </div>
      <div class="panel-b" id="modalBody"></div>
      <div class="sheet-actions" id="modalActions"></div>
    </div>
  </div>
  <div id="printRoot" class="hidden"></div>
  <div class="toast-wrap" id="toasts"></div>
  <script src="./src/state/initial-state.js"></script>
  <script src="./src/state/migrations.js"></script>
  <script src="./src/services/storage-local.js"></script>

  <script src="./src/services/camera/camera-service.js"></script>

  <script src="./src/services/vision/perspective-service.js"></script>
  <script src="./src/services/vision/enhance-service.js"></script>
  <script src="./src/services/vision/scan-processing-service.js"></script>
  <script src="./src/services/ocr/ocr-service.js"></script>
  <script src="./src/services/pdf/pdf-export-service.js"></script>
  <script src="./src/ui/cards/invoice-card.js"></script>
  <script src="./src/ui/cards/client-card.js"></script>

  <script src="./src/ui/render-nav.js"></script>
  <script src="./src/ui/render-views.js"></script>
  <script src="./src/services/splash.js"></script>

  <script src="./src/services/supabase-realtime.js"></script>
